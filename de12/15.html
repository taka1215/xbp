<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>資料ページ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN",
                   "Yu Gothic", "Meiryo", sans-serif;
      margin: 40px;
      background-color: #fafafa;
      color: #222;
      line-height: 1.8;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 20px;
    }

    h2 {
      font-size: 20px;
      margin: 40px 0 16px;
      border-bottom: 2px solid #ddd;
      padding-bottom: 6px;
    }

    .pdf-wrapper {
      width: 100%;
      height: 900px;
      border: 1px solid #ccc;
      background: #fff;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .note {
      margin-top: 12px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>

<h1>提出資料</h1>

<p>
以下にPDF資料を表示。
</p>

<h2>PDF資料</h2>

<div class="pdf-wrapper">
  <iframe src="files/document1.pdf"></iframe>
</div>

<p class="note">
</p>

</body>
</html>
